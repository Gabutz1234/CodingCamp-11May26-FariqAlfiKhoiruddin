<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense & Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-wrapper">

    <!-- Header -->
    <header class="app-header">
      <h1 class="app-title">💸 Budget Tracker</h1>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">
        <span class="theme-icon">🌙</span>
      </button>
    </header>

    <!-- Balance Card -->
    <section class="balance-card" aria-label="Total balance">
      <p class="balance-label">Total Balance</p>
      <h2 class="balance-amount" id="balanceAmount">$0.00</h2>
      <div class="balance-stats">
        <div class="stat">
          <span class="stat-label">Transactions</span>
          <span class="stat-value" id="txCount">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Highest Spend</span>
          <span class="stat-value" id="highestSpend">$0.00</span>
        </div>
      </div>
    </section>

    <!-- Spending Limit Banner -->
    <div class="limit-banner hidden" id="limitBanner" role="alert">
      ⚠️ You've exceeded your spending limit of <strong id="limitDisplay">$0</strong>!
    </div>

    <!-- Add Transaction Form -->
    <section class="card form-card">
      <h2 class="section-title">Add Transaction</h2>
      <form id="txForm" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="itemName">Item Name</label>
            <input
              type="text"
              id="itemName"
              placeholder="e.g. Coffee"
              autocomplete="off"
              maxlength="50"
            />
            <span class="field-error" id="nameError"></span>
          </div>
          <div class="form-group">
            <label for="itemAmount">Amount ($)</label>
            <input
              type="number"
              id="itemAmount"
              placeholder="0.00"
              min="0.01"
              step="0.01"
            />
            <span class="field-error" id="amountError"></span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="itemCategory">Category</label>
            <select id="itemCategory">
              <option value="">-- Select --</option>
              <option value="Food">🍔 Food</option>
              <option value="Transport">🚌 Transport</option>
              <option value="Fun">🎉 Fun</option>
            </select>
            <span class="field-error" id="categoryError"></span>
          </div>
          <div class="form-group">
            <label for="spendLimit">Spending Limit ($)</label>
            <input
              type="number"
              id="spendLimit"
              placeholder="Optional"
              min="0"
              step="0.01"
            />
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="addBtn">
          + Add Transaction
        </button>
      </form>
    </section>

    <!-- Chart Section -->
    <section class="card chart-card">
      <h2 class="section-title">Spending by Category</h2>
      <div class="chart-container">
        <canvas id="spendingChart" aria-label="Pie chart of spending by category"></canvas>
        <p class="chart-empty" id="chartEmpty">No data yet. Add a transaction!</p>
      </div>
      <div class="chart-legend" id="chartLegend"></div>
    </section>

    <!-- Transaction List -->
    <section class="card list-card">
      <div class="list-header">
        <h2 class="section-title">Transactions</h2>
        <div class="list-controls">
          <select id="sortSelect" aria-label="Sort transactions">
            <option value="date-desc">Newest First</option>
            <option value="date-asc">Oldest First</option>
            <option value="amount-desc">Highest Amount</option>
            <option value="amount-asc">Lowest Amount</option>
            <option value="category">By Category</option>
          </select>
          <button class="btn btn-danger btn-sm" id="clearAllBtn" title="Clear all transactions">
            🗑 Clear All
          </button>
        </div>
      </div>

      <ul class="tx-list" id="txList" aria-label="Transaction list">
        <li class="tx-empty" id="txEmpty">No transactions yet.</li>
      </ul>
    </section>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
